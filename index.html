<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đồ Nội Thất AR</title>
    <!-- Nhúng thư viện AR của Google -->
    <script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/3.4.0/model-viewer.min.js"></script>
    <style>
        body { margin: 0; background-color: #f8f9fa; }
        /* Để khung hiển thị chiếm hết màn hình điện thoại */
        model-viewer {
            width: 100vw;
            height: 100vh;
        }
    </style>
</head>
<body>

    <!-- src: đường dẫn file 3D của bạn -->
    <!-- ios-src: nếu bạn có file .usdz cho iPhone (không bắt buộc, iPhone vẫn chạy được glb qua web) -->
    <model-viewer 
        src="sofa.glb" 
        ar 
        ar-modes="webxr scene-viewer quick-look" 
        camera-controls 
        shadow-intensity="1" 
        touch-action="pan-y">
        
        <!-- Nút bấm hiển thị trên web để kích hoạt chế độ camera -->
        <button slot="ar-button" style="background-color: #007bff; color: white; border: none; border-radius: 4px; padding: 10px 20px; position: absolute; bottom: 50px; left: 50%; transform: translateX(-50%);">
            BẮT ĐẦU ĐẶT ĐỒ VẬT
        </button>

    </model-viewer>

</body>
</html>
